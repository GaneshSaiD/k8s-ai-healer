# infra/sample-app/crashloop-app.yaml
# A deliberately broken app that crash loops — used to demo the healer in action
# Deploy with: kubectl apply -f infra/sample-app/crashloop-app.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    app: k8s-ai-healer-demo

---
# Crashlooping deployment — exits with error every 10 seconds
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-app
  namespace: demo
  labels:
    app: crashloop-app
    demo: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crashloop-app
  template:
    metadata:
      labels:
        app: crashloop-app
    spec:
      containers:
        - name: crashloop
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Starting demo app..."
              sleep 10
              echo "Simulating crash!"
              exit 1
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"

---
# Healthy app alongside it (for contrast in the dashboard)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-app
  namespace: demo
  labels:
    app: healthy-app
    demo: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthy-app
  template:
    metadata:
      labels:
        app: healthy-app
    spec:
      containers:
        - name: healthy
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30

---
# Service for healthy app
apiVersion: v1
kind: Service
metadata:
  name: healthy-app
  namespace: demo
spec:
  selector:
    app: healthy-app
  ports:
    - port: 80
      targetPort: 80

---
# OOM app — consumes memory until killed (triggers OOMKilled alert)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: demo
  labels:
    app: oom-app
    demo: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
        - name: oom
          image: python:3.11-slim
          command: ["python", "-c"]
          args:
            - |
              import time
              print("Allocating memory...")
              data = []
              while True:
                  data.append(" " * 10_000_000)  # 10MB chunks
                  time.sleep(0.5)
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"   # Tight limit so it OOMs quickly
              cpu: "100m"
