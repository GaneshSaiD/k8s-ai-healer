# docker-compose.yml
# Local full-stack dev environment
# Usage: docker-compose up

version: "3.9"

services:

  # FastAPI webhook receiver
  webhook:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - K8S_CONFIG=local
      - DRY_RUN=true
    volumes:
      # Mount kubeconfig so webhook can talk to Minikube
      - ~/.kube:/root/.kube:ro
      - ~/.minikube:/root/.minikube:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit dashboard
  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - webhook
    restart: unless-stopped

networks:
  default:
    name: k8s-ai-healer-network
