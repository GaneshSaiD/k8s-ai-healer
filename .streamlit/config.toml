# .streamlit/config.toml
# Streamlit Cloud deployment config

[theme]
base = "dark"
primaryColor = "#2196f3"
backgroundColor = "#0e1117"
secondaryBackgroundColor = "#161b2e"
textColor = "#e0e0e0"
font = "sans serif"

[server]
headless = true
enableCORS = false
port = 8501

[browser]
gatherUsageStats = false
